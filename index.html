<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Daily Planner 🌿</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e8f5f2, #fdf6f9);
  padding: 20px;
}
.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 18px;
}
.section {
  margin-bottom: 18px;
  padding: 15px;
  border-radius: 14px;
  background: #f9fbfa;
}
button {
  padding: 8px 14px;
  margin: 4px;
  border-radius: 10px;
  background: #d7ebe5;
  border: none;
  cursor: pointer;
}
.tab { display:none; }
.activeTab { display:block; }
ul { list-style:none; padding:0; }
li { margin:5px 0; }
</style>
</head>

<body>
<div class="container">

<h1>🌿 Daily Planner</h1>

<button onclick="showTab('dailyTab')">Daily</button>
<button onclick="showTab('cleaningTab')">Cleaning</button>
<button onclick="showTab('tasksTab')">Tasks</button>
<button onclick="showTab('wellnessTab')">Wellness</button>

<!-- DAILY -->
<div id="dailyTab" class="tab activeTab">

<div class="section">
<strong>Date:</strong> <span id="date"></span><br>
<strong>Day:</strong> <span id="day"></span>
</div>

<div class="section">
<strong>Mood</strong><br>
<span onclick="setMood('🤩')">🤩</span>
<span onclick="setMood('😀')">😀</span>
<span onclick="setMood('😐')">😐</span>
<span onclick="setMood('😕')">😕</span>
<span onclick="setMood('😭')">😭</span>
<p id="moodDisplay"></p>
</div>

<div class="section">
<strong>Goal</strong>
<input id="goal">
</div>

<div class="section">
<strong>Quote</strong>
<p id="quote"></p>
</div>

<div class="section">
<strong>Water</strong>
<div id="waterCount"></div>
<div id="waterContainer"></div>
</div>

</div>

<!-- CLEANING -->
<div id="cleaningTab" class="tab">
<div class="section"><strong>Daily</strong><ul id="dailyClean"></ul></div>
<div class="section"><strong>Weekly</strong><div id="weeklyClean"></div></div>
<div class="section"><strong>Monthly</strong><div id="monthlyClean"></div></div>
</div>

<!-- TASKS -->
<div id="tasksTab" class="tab">
<div class="section">
<input id="todoInput">
<button onclick="addTodo()">Add</button>
<ul id="todoList"></ul>
</div>
</div>

<!-- WELLNESS -->
<div id="wellnessTab" class="tab">
<div class="section"><strong>Habits</strong><ul id="habits"></ul></div>
<div class="section"><strong>Morning</strong><ul id="morning"></ul></div>
<div class="section"><strong>Evening</strong><ul id="evening"></ul></div>
</div>

</div>

<script type="module">

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "YOUR DOMAIN",
  projectId: "YOUR ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, "planner", "main");

// SAVE
async function saveData(data){
  await setDoc(docRef, data, { merge: true });
}

// LISTEN
window.globalData = {};
onSnapshot(docRef, (docSnap)=>{
  window.globalData = docSnap.data() || {};
  init();
});

// TABS
window.showTab = function(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("activeTab"));
  document.getElementById(id).classList.add("activeTab");
};

// MOOD
window.setMood = function(m){
  saveData({ mood:m });
  document.getElementById("moodDisplay").textContent=m;
};

// DATE
let now=new Date();
date.textContent=now.toLocaleDateString();
day.textContent=now.toLocaleDateString("en-US",{weekday:"long"});

// QUOTE
const quotes=[
"The only thing we have to fear is fear itself.",
"Do what you can, with what you have, where you are.",
"It always seems impossible until it’s done."
];
quote.textContent = quotes[Math.floor(Math.random()*quotes.length)];

// CHECKLIST
function renderChecklist(id, arr){
let ul=document.getElementById(id);
ul.innerHTML="";
let saved=globalData[id]||{};
arr.forEach((t,i)=>{
let li=document.createElement("li");
let cb=document.createElement("input");
cb.type="checkbox";
cb.checked=saved[i]||false;
cb.onchange=()=>{
saved[i]=cb.checked;
saveData({[id]:saved});
};
li.appendChild(cb);
li.append(" "+t);
ul.appendChild(li);
});
}

// WATER
let water=[];
function renderWater(){
water=globalData.water||Array(8).fill(false);
waterCount.textContent=water.filter(x=>x).length+"/8";
waterContainer.innerHTML="";
water.forEach((v,i)=>{
let s=document.createElement("span");
s.textContent="💧";
s.style.opacity=v?1:.3;
s.onclick=()=>{
water[i]=!water[i];
saveData({water});
};
waterContainer.appendChild(s);
});
}

// TODOS
let todos=[];
window.addTodo=function(){
let v=todoInput.value;
if(!v)return;
todos.push(v);
saveData({todos});
};
function renderTodos(){
todos=globalData.todos||[];
todoList.innerHTML="";
todos.forEach((t,i)=>{
let li=document.createElement("li");
li.textContent=t;
li.onclick=()=>{
todos.splice(i,1);
saveData({todos});
};
todoList.appendChild(li);
});
}

// WEEKLY CLEAN (simple)
const weekly={
Monday:["Den","Vacuum"],
Tuesday:["Laundry"],
Wednesday:["Bathroom"],
Thursday:["Living Room"],
Friday:["Office"],
Saturday:["Nursery"],
Sunday:["Bedroom"]
};

function renderWeekly(){
let today=new Date().toLocaleDateString("en-US",{weekday:"long"});
let list=weekly[today]||[];
weeklyClean.innerHTML="";
list.forEach(t=>{
let li=document.createElement("li");
li.textContent=t;
weeklyClean.appendChild(li);
});
}

// MONTHLY
function renderMonthly(){
let d=new Date().getDate();
monthlyClean.innerHTML="Task "+d;
}

// INIT (runs after Firebase loads)
function init(){

// text
goal.value=globalData.goal||"";
goal.oninput=()=>saveData({goal:goal.value});

// water
renderWater();

// todos
renderTodos();

// lists
renderChecklist("dailyClean",["Dishes","Trash","Sweep"]);
renderChecklist("habits",["Water","Sleep"]);
renderChecklist("morning",["Wake up","Shower"]);
renderChecklist("evening",["Dinner","Bed"]);

// cleaning
renderWeekly();
renderMonthly();

// mood
moodDisplay.textContent=globalData.mood||"";

}

</script>

</body>
</html>
